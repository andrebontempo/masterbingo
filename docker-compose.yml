services:
  frontend:
    container_name: bingov2-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ./frontend/.env.production
    # ports:
    #   - "3000:3000"
    networks:
      - proxy
    depends_on:
      - backend

  backend:
    container_name: bingov2-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ./backend/.env
    # ports:
    #   - "5000:5000"
    networks:
      - proxy
    depends_on:
      - mongo

  mongo:
    image: mongo:7
    container_name: bingov2-mongo
    restart: unless-stopped
    volumes:
      - ./data/mongo:/data/db
    networks:
      - proxy

networks:
  proxy:
    external: true
